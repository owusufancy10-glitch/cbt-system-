<!DOCTYPE html>
<html>
<head>
<title>Exam System</title>

<style>
body { font-family: Arial; padding:20px; }
.hidden { display:none; }
button { padding:10px; margin:5px; }
</style>

</head>
<body>

<h1>Exam System</h1>

<!-- HOME -->
<div id="home">
  <button onclick="show('teacher')">Teacher</button>
  <button onclick="show('student')">Student</button>
</div>

<!-- TEACHER -->
<div id="teacher" class="hidden">
<h2>Teacher Panel</h2>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="signUp()">Sign Up</button>
<button onclick="login()">Login</button>

<hr>

<h3>Add Question</h3>

<input id="question" placeholder="Question"><br>

<select id="type">
<option value="objective">Objective</option>
<option value="theory">Theory</option>
</select><br>

<input id="A" placeholder="Option A"><br>
<input id="B" placeholder="Option B"><br>
<input id="C" placeholder="Option C"><br>
<input id="D" placeholder="Option D"><br>

<input id="correct" placeholder="Correct answer OR keywords (comma)"><br>

<button onclick="addQuestion()">Add</button>

<h3>All Questions</h3>
<div id="adminList"></div>

<button onclick="show('home')">Back</button>
</div>

<!-- STUDENT -->
<div id="student" class="hidden">
<h2>Student Exam</h2>

<input id="name" placeholder="Name"><br>

<h3 id="timer">Time: 60</h3>

<div id="examBox"></div>

<button onclick="nextQ()">Next</button>
<button onclick="submitExam()">Submit</button>
</div>

<!-- RESULT -->
<div id="result" class="hidden">
<h2 id="resultText"></h2>
<button onclick="show('home')">Back</button>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "PASTE",
  authDomain: "PASTE",
  projectId: "PASTE",
};
firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

// NAVIGATION
function show(id){
  document.querySelectorAll("div").forEach(d=>d.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}

// AUTH
function signUp(){
  auth.createUserWithEmailAndPassword(email.value,password.value)
  .then(()=>alert("Created"));
}

function login(){
  auth.signInWithEmailAndPassword(email.value,password.value)
  .then(()=>loadAdmin());
}

// ADD QUESTION
function addQuestion(){
  db.collection("questions").add({
    q:question.value,
    type:type.value,
    A:A.value,B:B.value,C:C.value,D:D.value,
    correct:correct.value
  }).then(()=>alert("Added"));
}

// ADMIN VIEW
function
